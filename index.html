---
layout: default
---

<div class="home">
  
  <ul class="posts">
    {% for post in site.posts %}
      <li>
        <span class="post-date">{{ post.date | date: "%b %-d, %Y" }}</span>
        {% if post.link %}
        <a class="post-link" href="{{ post.link }}">{{ post.title }} ↗</a>
        {% else %}
        <a class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
        {% endif %}
        <br>
        {{ post.excerpt }}
      </li>
    {% endfor %}
  </ul>

</div>
